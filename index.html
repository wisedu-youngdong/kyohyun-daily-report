<!DOCTYPE html>
<html lang="ko">
  <head>

    <meta property="og:site_name" content="교현학원 데일리 리포트" />

    <meta property="og:image" content="https://kyohyun-daily-report.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://kyohyun-daily-report.vercel.app" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="theme-color" content="#0D2D6B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="교현리포트" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- 폰트 -->
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&display=swap"
    />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
        background: #F9FAFB;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      button { cursor: pointer; }
      input, textarea, select { font-family: inherit; }
      /* iOS 입력창 줌 방지 */
      input[type="text"], input[type="email"], input[type="number"], textarea, select {
        font-size: 16px;
      }
    </style>
  </head>
